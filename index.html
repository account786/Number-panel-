<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NUMBER PANEL</title>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            font-family: 'Segoe UI', Roboto, sans-serif; 
            background: #121212; 
            color: #fff; 
            margin: 0; 
            padding: 15px; 
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .header {
            width: 100%;
            padding: 15px;
            text-align: left;
            font-weight: bold;
            font-size: 18px;
            border-bottom: 1px solid #333;
            margin-bottom: 20px;
        }

        .card { 
            background: #1e1e1e; 
            width: 100%; 
            max-width: 550px; 
            padding: 25px; 
            border-radius: 20px; 
            text-align: center; 
            border: 1px solid #333; 
            margin-bottom: 25px;
        }

        h3 { margin-top: 0; margin-bottom: 20px; color: #00e676; font-size: 22px; }
        
        .box { 
            background: #252525; 
            padding: 12px 15px; 
            border-radius: 12px; 
            margin-bottom: 15px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            border: 1px solid #3a3a3a; 
        }

        .input-text { 
            font-size: 16px; 
            color: #fff; 
            border:none; 
            background:transparent; 
            width: 70%; 
            outline: none;
        }
        
        .btn-copy { 
            background: #00e676; 
            color: #000; 
            border: none; 
            padding: 10px 18px; 
            border-radius: 8px; 
            font-size: 14px; 
            cursor: pointer; 
            font-weight: bold; 
        }

        .btn-main { 
            width: 100%; 
            background: #2979ff; 
            color: white; 
            border: none; 
            padding: 16px; 
            border-radius: 15px; 
            font-size: 18px; 
            font-weight: bold; 
            cursor: pointer; 
            transition: 0.3s; 
        }

        .btn-stex { background: #ff5722; }

        /* --- ইন-পেজ ব্রাউজার (Overlay) ডিজাইন --- */
        #browser-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: #000;
            z-index: 1000;
        }

        #browser-header {
            height: 50px;
            background: #222;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 15px;
            border-bottom: 1px solid #444;
        }

        #browser-header span { font-size: 14px; color: #00e676; }

        #close-btn {
            background: #ff4444;
            color: white;
            border: none;
            padding: 5px 15px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }

        iframe {
            width: 100%;
            height: calc(100% - 50px);
            border: none;
        }

        /* টোস্ট */
        #toast {
            visibility: hidden;
            min-width: 180px;
            background-color: #00e676;
            color: #000;
            text-align: center;
            border-radius: 50px;
            padding: 12px;
            position: fixed;
            z-index: 100;
            left: 50%;
            bottom: 30px;
            transform: translateX(-50%);
            font-size: 15px;
            font-weight: bold;
            opacity: 0;
            transition: 0.4s;
        }
        #toast.show { visibility: visible; opacity: 1; }
    </style>
</head>
<body>

    <div class="header">Number Panel</div>

    <!-- MK Network -->
    <div class="card">
        <h3>MK Network Access</h3>
        <div class="box">
            <input type="text" value="hasankhan5258786@gmail.com" id="email1" class="input-text" readonly>
            <button class="btn-copy" onclick="copyVal('email1')">Copy</button>
        </div>
        <div class="box">
            <input type="text" value="Nayem@1122" id="pass1" class="input-text" readonly>
            <button class="btn-copy" onclick="copyVal('pass1')">Copy</button>
        </div>
        <p style="color:#888; font-size:13px; margin-bottom:15px;">কপি করে নিচের বাটনে ক্লিক করুন</p>
        <button class="btn-main" onclick="openBrowser('https://mknetworkbd.com/')">লগইন পেজ ওপেন করুন</button>
    </div>

    <!-- StexSMS -->
    <div class="card">
        <h3>StexSMS Access</h3>
        <div class="box">
            <input type="text" value="nayemhasan7t8@gmail.com" id="email2" class="input-text" readonly>
            <button class="btn-copy" onclick="copyVal('email2')">Copy</button>
        </div>
        <div class="box">
            <input type="text" value="Nayem@1122" id="pass2" class="input-text" readonly>
            <button class="btn-copy" onclick="copyVal('pass2')">Copy</button>
        </div>
        <p style="color:#888; font-size:13px; margin-bottom:15px;">কপি করে নিচের বাটনে ক্লিক করুন</p>
        <button class="btn-main btn-stex" onclick="openBrowser('https://stexsms.com/')">লগইন পেজ ওপেন করুন</button>
    </div>

    <!-- ইন-পেজ ব্রাউজার এলিমেন্ট -->
    <div id="browser-overlay">
        <div id="browser-header">
            <span id="site-title">Loading Site...</span>
            <button id="close-btn" onclick="closeBrowser()">বন্ধ করুন [X]</button>
        </div>
        <iframe src="" id="site-frame"></iframe>
    </div>

    <div id="toast">কপি হয়েছে!</div>

    <script>
        // কপি ফাংশন
        function copyVal(id) {
            var input = document.getElementById(id);
            input.select();
            input.setSelectionRange(0, 99999);
            document.execCommand("copy");
            
            // আধুনিক সিস্টেম
            if(navigator.clipboard) {
                navigator.clipboard.writeText(input.value);
            }
            showToast();
        }

        function showToast() {
            var x = document.getElementById("toast");
            x.className = "show";
            setTimeout(function(){ x.className = x.className.replace("show", ""); }, 2000);
        }

        // ইন-পেজ ব্রাউজার কন্ট্রোল
        function openBrowser(url) {
            document.getElementById('site-frame').src = url;
            document.getElementById('browser-overlay').style.display = 'block';
            document.getElementById('site-title').innerText = url;
        }

        function closeBrowser() {
            document.getElementById('browser-overlay').style.display = 'none';
            document.getElementById('site-frame').src = '';
        }
    </script>

</body>
</html>
