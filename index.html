<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NUMBER PANEL</title>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            background: #121212; 
            color: #fff; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            min-height: 100vh; 
            margin: 0; 
            padding: 15px; 
        }
        
        /* মেইন কার্ড ডিজাইন */
        .card { 
            background: #1e1e1e; 
            width: 100%; 
            max-width: 550px; 
            padding: 25px 20px; 
            border-radius: 20px; 
            text-align: center; 
            border: 1px solid #333; 
            margin-bottom: 25px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.4);
        }

        h3 { margin-top: 0; margin-bottom: 20px; color: #00e676; font-size: 22px; font-weight: 600; }
        
        .box { 
            background: #2c2c2c; 
            padding: 12px 15px; 
            border-radius: 12px; 
            margin-bottom: 15px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            border: 1px solid #444; 
        }

        .input-text { 
            font-size: 15px; 
            color: #eee; 
            border:none; 
            background:transparent; 
            width: 70%; 
            outline: none; 
            font-family: monospace;
        }
        
        .btn-copy { 
            background: #00e676; 
            color: #000; 
            border: none; 
            padding: 10px 18px; 
            border-radius: 8px; 
            font-size: 14px; 
            cursor: pointer; 
            font-weight: bold; 
        }

        .btn-main { 
            width: 100%; 
            background: #2979ff; 
            color: white; 
            border: none; 
            padding: 16px; 
            border-radius: 12px; 
            font-size: 18px; 
            font-weight: bold; 
            cursor: pointer; 
            transition: 0.3s; 
        }

        /* --- ইন-পেজ ব্রাউজার ওভারলে --- */
        #browser-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: #121212;
            z-index: 1000;
        }

        /* ব্রাউজার হেডার (URL এবং বন্ধ করুন বাটন) */
        #browser-header {
            height: 50px;
            background: #1e1e1e;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 15px;
            border-bottom: 1px solid #333;
        }
        #site-url { font-size: 12px; color: #00e676; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 60%; }
        #close-btn { background: #ff4444; color: #fff; border: none; padding: 6px 12px; border-radius: 6px; font-weight: bold; cursor: pointer; }

        /* কুইক কপি বার (যা সাইটের উপরে থাকবে) */
        #quick-copy-bar {
            background: #2c2c2c;
            padding: 10px;
            display: flex;
            gap: 10px;
            justify-content: center;
            border-bottom: 1px solid #444;
        }
        .q-btn {
            flex: 1;
            background: #444;
            color: #fff;
            border: 1px solid #555;
            padding: 8px;
            border-radius: 6px;
            font-size: 12px;
            cursor: pointer;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .q-btn span { color: #00e676; font-weight: bold; margin-right: 5px; }

        iframe { width: 100%; height: calc(100% - 105px); border: none; }

        /* টোস্ট মেসেজ */
        #toast {
            visibility: hidden;
            min-width: 200px;
            background-color: #00e676;
            color: #000;
            text-align: center;
            border-radius: 50px;
            padding: 14px;
            position: fixed;
            z-index: 1100;
            left: 50%; bottom: 40px;
            transform: translateX(-50%);
            font-size: 16px;
            font-weight: bold;
            opacity: 0;
            transition: 0.4s;
        }
        #toast.show { visibility: visible; opacity: 1; }
    </style>
</head>
<body>

    <!-- MK Network -->
    <div class="card">
        <h3>MK Network Access</h3>
        <div class="box">
            <input type="text" value="hasankhan5258786@gmail.com" id="email1" class="input-text" readonly>
            <button class="btn-copy" onclick="copyText('email1')">Copy</button>
        </div>
        <div class="box">
            <input type="text" value="Nayem@1122" id="pass1" class="input-text" readonly>
            <button class="btn-copy" onclick="copyText('pass1')">Copy</button>
        </div>
        <button class="btn-main" onclick="openBrowser('https://mknetworkbd.com/', 'hasankhan5258786@gmail.com', 'Nayem@1122')">লগইন পেজ ওপেন করুন</button>
    </div>

    <!-- StexSMS -->
    <div class="card">
        <h3>StexSMS Access</h3>
        <div class="box">
            <input type="text" value="nayemhasan7t8@gmail.com" id="email2" class="input-text" readonly>
            <button class="btn-copy" onclick="copyText('email2')">Copy</button>
        </div>
        <div class="box">
            <input type="text" value="Nayem@1122" id="pass2" class="input-text" readonly>
            <button class="btn-copy" onclick="copyText('pass2')">Copy</button>
        </div>
        <button class="btn-main" style="background: #ff5722;" onclick="openBrowser('https://stexsms.com/', 'nayemhasan7t8@gmail.com', 'Nayem@1122')">লগইন পেজ ওপেন করুন</button>
    </div>

    <!-- ব্রাউজার ওভারলে এলিমেন্ট -->
    <div id="browser-overlay">
        <div id="browser-header">
            <div id="site-url">URL</div>
            <button id="close-btn" onclick="closeBrowser()">বন্ধ করুন [X]</button>
        </div>
        <!-- কুইক কপি সিস্টেম -->
        <div id="quick-copy-bar">
            <button class="q-btn" id="q-email-btn" onclick="copyDirect(this.dataset.val)"><span>Email:</span> <span id="q-email-text">...</span></button>
            <button class="q-btn" id="q-pass-btn" onclick="copyDirect(this.dataset.val)"><span>Pass:</span> <span id="q-pass-text">...</span></button>
        </div>
        <iframe src="" id="site-frame"></iframe>
    </div>

    <div id="toast">সাফল্যের সাথে কপি হয়েছে!</div>

    <script>
        // কপি ফাংশন (মেইন পেজের জন্য)
        function copyText(id) {
            var val = document.getElementById(id).value;
            copyDirect(val);
        }

        // সরাসরি কপি করার কমন ফাংশন
        function copyDirect(text) {
            var textArea = document.createElement("textarea");
            textArea.value = text;
            document.body.appendChild(textArea);
            textArea.select();
            document.execCommand('copy');
            document.body.removeChild(textArea);
            showToast();
        }

        function showToast() {
            var x = document.getElementById("toast");
            x.className = "show";
            setTimeout(function(){ x.className = x.className.replace("show", ""); }, 2000);
        }

        // ইন-পেজ ব্রাউজার ওপেন
        function openBrowser(url, email, pass) {
            document.getElementById('site-frame').src = url;
            document.getElementById('site-url').innerText = url;
            
            // কুইক কপি বারে ডাটা সেট করা
            document.getElementById('q-email-text').innerText = email;
            document.getElementById('q-email-btn').dataset.val = email;
            
            document.getElementById('q-pass-text').innerText = pass;
            document.getElementById('q-pass-btn').dataset.val = pass;

            document.getElementById('browser-overlay').style.display = 'block';
        }

        function closeBrowser() {
            document.getElementById('browser-overlay').style.display = 'none';
            document.getElementById('site-frame').src = '';
        }
    </script>

</body>
</html>
