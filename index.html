<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NUMBER PANEL</title>
    <style>
        /* পুরো স্ক্রিন জুড়ে সেটআপ */
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            font-family: 'Segoe UI', Roboto, sans-serif; 
            background: #121212; 
            color: #fff; 
            margin: 0; 
            padding: 15px; 
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .header {
            width: 100%;
            padding: 15px;
            text-align: left;
            font-weight: bold;
            font-size: 18px;
            border-bottom: 1px solid #333;
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* কার্ড ডিজাইন যা ফোনের স্ক্রিনের সাথে অটো মিলবে */
        .card { 
            background: #1e1e1e; 
            width: 100%; 
            max-width: 600px; /* পিসি বা বড় স্ক্রিনেও সুন্দর দেখাবে */
            padding: 25px; 
            border-radius: 20px; 
            text-align: center; 
            border: 1px solid #333; 
            margin-bottom: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        h3 { margin-top: 0; margin-bottom: 25px; color: #00e676; font-size: 24px; }
        
        .box { 
            background: #252525; 
            padding: 15px; 
            border-radius: 12px; 
            margin-bottom: 15px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            border: 1px solid #3a3a3a; 
        }

        .input-text { 
            font-size: 16px; 
            color: #fff; 
            border:none; 
            background:transparent; 
            width: 70%; 
            outline: none; 
            font-family: monospace;
        }
        
        .btn-copy { 
            background: #00e676; 
            color: #000; 
            border: none; 
            padding: 10px 20px; 
            border-radius: 8px; 
            font-size: 14px; 
            cursor: pointer; 
            font-weight: bold; 
            transition: 0.2s;
        }

        .btn-copy:active { background: #00b35c; transform: scale(0.9); }
        
        .hint { font-size: 14px; color: #888; margin: 15px 0; }
        
        /* লগইন বাটন - যা নতুন ট্যাব ওপেন করবে */
        .btn-main { 
            width: 100%; 
            background: #2979ff; 
            color: white; 
            border: none; 
            padding: 18px; 
            border-radius: 15px; 
            font-size: 18px; 
            font-weight: bold; 
            cursor: pointer; 
            transition: 0.3s; 
            display: block;
            text-decoration: none;
        }

        .btn-stex { background: #ff5722; }

        .btn-main:hover { opacity: 0.9; }
        .btn-main:active { transform: scale(0.98); }

        /* টোস্ট মেসেজ */
        #toast {
            visibility: hidden;
            min-width: 200px;
            background-color: #00e676;
            color: #000;
            text-align: center;
            border-radius: 50px;
            padding: 15px;
            position: fixed;
            z-index: 100;
            left: 50%;
            bottom: 30px;
            transform: translateX(-50%);
            font-size: 16px;
            font-weight: bold;
            opacity: 0;
            transition: opacity 0.4s;
        }

        #toast.show { visibility: visible; opacity: 1; }
    </style>
</head>
<body>

    <div class="header">Number Panel</div>

    <!-- MK Network Section -->
    <div class="card">
        <h3>MK Network Access</h3>
        <div class="box">
            <input type="text" value="hasankhan5258786@gmail.com" id="email1" class="input-text" readonly>
            <button class="btn-copy" onclick="copyValue('email1')">Copy</button>
        </div>
        <div class="box">
            <input type="text" value="Nayem@1122" id="pass1" class="input-text" readonly>
            <button class="btn-copy" onclick="copyValue('pass1')">Copy</button>
        </div>
        <p class="hint">তথ্যগুলো কপি করে নিচের বাটনে ক্লিক করুন।</p>
        <!-- target="_blank" এর মাধ্যমে নতুন ট্যাব ওপেন হবে -->
        <a href="https://mknetworkbd.com/" target="_blank" class="btn-main">MK Network লগইন</a>
    </div>

    <!-- StexSMS Section -->
    <div class="card">
        <h3>StexSMS Access</h3>
        <div class="box">
            <input type="text" value="nayemhasan7t8@gmail.com" id="email2" class="input-text" readonly>
            <button class="btn-copy" onclick="copyValue('email2')">Copy</button>
        </div>
        <div class="box">
            <input type="text" value="Nayem@1122" id="pass2" class="input-text" readonly>
            <button class="btn-copy" onclick="copyValue('pass2')">Copy</button>
        </div>
        <p class="hint">তথ্যগুলো কপি করে নিচের বাটনে ক্লিক করুন।</p>
        <a href="https://stexsms.com/" target="_blank" class="btn-main btn-stex">StexSMS লগইন</a>
    </div>

    <div id="toast">সাফল্যের সাথে কপি হয়েছে!</div>

    <script>
        function copyValue(id) {
            var input = document.getElementById(id);
            
            // সব ব্রাউজারের জন্য কার্যকরী কপি সিস্টেম
            if (navigator.clipboard && window.isSecureContext) {
                navigator.clipboard.writeText(input.value).then(() => {
                    showToast();
                });
            } else {
                input.select();
                input.setSelectionRange(0, 99999);
                document.execCommand("copy");
                showToast();
            }
        }

        function showToast() {
            var x = document.getElementById("toast");
            x.className = "show";
            setTimeout(function(){ x.className = x.className.replace("show", ""); }, 2000);
        }
    </script>

</body>
</html>
