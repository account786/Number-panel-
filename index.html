<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NUMBER PANEL</title>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            background: #121212; 
            color: #fff; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            min-height: 100vh; 
            margin: 0; 
            padding: 15px; 
        }
        
        .header-title {
            width: 100%;
            padding: 10px;
            font-size: 18px;
            font-weight: bold;
            color: #00e676;
            text-align: left;
            border-bottom: 1px solid #333;
            margin-bottom: 20px;
        }

        /* কার্ড ডিজাইন */
        .card { 
            background: #1e1e1e; 
            width: 100%; 
            max-width: 550px; 
            padding: 25px; 
            border-radius: 20px; 
            text-align: center; 
            border: 1px solid #333; 
            margin-bottom: 25px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.4);
        }

        h3 { margin-top: 0; margin-bottom: 20px; color: #00e676; font-size: 22px; }
        
        .box { 
            background: #2c2c2c; 
            padding: 12px 15px; 
            border-radius: 12px; 
            margin-bottom: 15px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            border: 1px solid #444; 
        }

        .input-text { 
            font-size: 15px; 
            color: #eee; 
            border:none; 
            background:transparent; 
            width: 70%; 
            outline: none; 
            font-family: monospace;
        }
        
        .btn-copy { 
            background: #00e676; 
            color: #000; 
            border: none; 
            padding: 10px 18px; 
            border-radius: 8px; 
            font-size: 14px; 
            cursor: pointer; 
            font-weight: bold; 
        }

        .btn-main { 
            width: 100%; 
            background: #2979ff; 
            color: white; 
            border: none; 
            padding: 18px; 
            border-radius: 15px; 
            font-size: 18px; 
            font-weight: bold; 
            cursor: pointer; 
            text-decoration: none;
            display: block;
            transition: 0.3s;
        }
        .btn-main:active { transform: scale(0.98); background: #1565c0; }

        /* টোস্ট মেসেজ */
        #toast {
            visibility: hidden;
            min-width: 200px;
            background-color: #00e676;
            color: #000;
            text-align: center;
            border-radius: 50px;
            padding: 14px;
            position: fixed;
            z-index: 100;
            left: 50%; bottom: 40px;
            transform: translateX(-50%);
            font-size: 16px;
            font-weight: bold;
            opacity: 0;
            transition: 0.4s;
        }
        #toast.show { visibility: visible; opacity: 1; }

        .hint { font-size: 13px; color: #888; margin-top: 10px; }
    </style>
</head>
<body>

    <div class="header-title">NUMBER PANEL</div>

    <!-- MK Network -->
    <div class="card">
        <h3>MK Network Access</h3>
        <div class="box">
            <input type="text" value="hasankhan5258786@gmail.com" id="email1" class="input-text" readonly>
            <button class="btn-copy" onclick="copyVal('email1')">Copy</button>
        </div>
        <div class="box">
            <input type="text" value="Nayem@1122" id="pass1" class="input-text" readonly>
            <button class="btn-copy" onclick="copyVal('pass1')">Copy</button>
        </div>
        <p class="hint">কপি করে নিচের বাটনে ক্লিক করুন</p>
        <a href="https://mknetworkbd.com/" target="_blank" class="btn-main">লগইন পেজ ওপেন করুন</a>
    </div>

    <!-- StexSMS -->
    <div class="card">
        <h3>StexSMS Access</h3>
        <div class="box">
            <input type="text" value="nayemhasan7t8@gmail.com" id="email2" class="input-text" readonly>
            <button class="btn-copy" onclick="copyVal('email2')">Copy</button>
        </div>
        <div class="box">
            <input type="text" value="Nayem@1122" id="pass2" class="input-text" readonly>
            <button class="btn-copy" onclick="copyVal('pass2')">Copy</button>
        </div>
        <p class="hint">কপি করে নিচের বাটনে ক্লিক করুন</p>
        <a href="https://stexsms.com/" target="_blank" class="btn-main" style="background: #ff5722;">লগইন পেজ ওপেন করুন</a>
    </div>

    <div id="toast">সাফল্যের সাথে কপি হয়েছে!</div>

    <script>
        function copyVal(id) {
            var input = document.getElementById(id);
            
            // মোবাইল এবং টেলিগ্রামের জন্য শক্তিশালী কপি সিস্টেম
            if (navigator.clipboard && window.isSecureContext) {
                navigator.clipboard.writeText(input.value).then(() => {
                    showToast();
                }).catch(() => {
                    fallbackCopy(input);
                });
            } else {
                fallbackCopy(input);
            }
        }

        function fallbackCopy(input) {
            input.select();
            input.setSelectionRange(0, 99999);
            document.execCommand("copy");
            showToast();
        }

        function showToast() {
            var x = document.getElementById("toast");
            x.className = "show";
            setTimeout(function(){ x.className = x.className.replace("show", ""); }, 2000);
        }
    </script>

</body>
</html>
