<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Access Panel</title>
    <style>
        * { box-sizing: border-box; }
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: #121212; 
            color: #fff; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            min-height: 100vh; 
            margin: 0; 
            padding: 15px; 
        }
        
        /* কার্ডটি এখন স্ক্রিনের ৯৫% পর্যন্ত বড় হবে */
        .card { 
            background: #1e1e1e; 
            width: 100%; 
            max-width: 500px; /* আগে ৩৫০ ছিল, এখন ৫০০ করা হয়েছে */
            padding: 30px 20px; 
            border-radius: 20px; 
            text-align: center; 
            border: 1px solid #333; 
            margin-bottom: 25px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        h3 { margin-bottom: 20px; color: #00e676; font-size: 22px; font-weight: 600; }
        
        /* ইনপুট বক্সগুলো আরও বড় করা হয়েছে */
        .box { 
            background: #2c2c2c; 
            padding: 15px; 
            border-radius: 12px; 
            margin-bottom: 15px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            border: 1px solid #444; 
        }

        .input-text { 
            font-size: 16px; 
            color: #eee; 
            border:none; 
            background:transparent; 
            width: 75%; 
            pointer-events: none; 
            outline: none; 
            font-family: monospace;
        }
        
        .btn-copy { 
            background: #00e676; 
            color: #000; 
            border: none; 
            padding: 8px 16px; 
            border-radius: 8px; 
            font-size: 14px; 
            cursor: pointer; 
            font-weight: bold; 
            transition: 0.3s;
        }

        .btn-copy:active { transform: scale(0.9); }
        
        .hint { font-size: 14px; color: #aaa; margin: 15px 0; line-height: 1.4; }
        
        /* লগইন বাটন বড় করা হয়েছে */
        .btn-main { 
            width: 100%; 
            background: #2979ff; 
            color: white; 
            border: none; 
            padding: 16px; 
            border-radius: 12px; 
            font-size: 18px; 
            font-weight: bold; 
            cursor: pointer; 
            transition: 0.2s; 
        }

        .btn-main:active { background: #1565c0; transform: scale(0.98); }

        /* টোস্ট মেসেজ */
        #toast {
            visibility: hidden;
            min-width: 150px;
            background-color: #00e676;
            color: #000;
            text-align: center;
            border-radius: 50px;
            padding: 12px 25px;
            position: fixed;
            z-index: 10;
            left: 50%;
            bottom: 30px;
            transform: translateX(-50%);
            font-size: 15px;
            font-weight: bold;
            opacity: 0;
            transition: opacity 0.4s, bottom 0.4s;
        }

        #toast.show {
            visibility: visible;
            opacity: 1;
            bottom: 50px;
        }
    </style>
</head>
<body>

    <!-- MK Network Access -->
    <div class="card">
        <h3>MK Network Access</h3>
        <div class="box">
            <input type="text" value="hasankhan5258786@gmail.com" id="email1" class="input-text" readonly>
            <button class="btn-copy" onclick="copy('email1')">Copy</button>
        </div>
        <div class="box">
            <input type="text" value="Nayem@1122" id="pass1" class="input-text" readonly>
            <button class="btn-copy" onclick="copy('pass1')">Copy</button>
        </div>
        <p class="hint">তথ্যগুলো কপি করে নিচের বাটনে ক্লিক করুন।</p>
        <button class="btn-main" onclick="location.href='https://mknetworkbd.com/'">MK Network লগইন</button>
    </div>

    <!-- StexSMS Access -->
    <div class="card">
        <h3>StexSMS Access</h3>
        <div class="box">
            <input type="text" value="nayemhasan7t8@gmail.com" id="email2" class="input-text" readonly>
            <button class="btn-copy" onclick="copy('email2')">Copy</button>
        </div>
        <div class="box">
            <input type="text" value="Nayem@1122" id="pass2" class="input-text" readonly>
            <button class="btn-copy" onclick="copy('pass2')">Copy</button>
        </div>
        <p class="hint">তথ্যগুলো কপি করে নিচের বাটনে ক্লিক করুন।</p>
        <button class="btn-main" style="background: #ff5722;" onclick="location.href='https://stexsms.com/'">StexSMS লগইন</button>
    </div>

    <!-- টোস্ট মেসেজ -->
    <div id="toast">কপি হয়েছে!</div>

    <script>
        function copy(id) {
            var copyText = document.getElementById(id);
            
            if (navigator.clipboard && navigator.clipboard.writeText) {
                navigator.clipboard.writeText(copyText.value).then(() => {
                    showToast();
                });
            } else {
                copyText.select();
                copyText.setSelectionRange(0, 99999);
                document.execCommand('copy');
                showToast();
            }
        }

        function showToast() {
            var x = document.getElementById("toast");
            x.className = "show";
            setTimeout(function(){ x.className = x.className.replace("show", ""); }, 2000);
        }
    </script>

</body>
</html>
