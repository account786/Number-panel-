    <style>

            border-radius: 20px;
            box-shadow: 0 15px 30px rgba(0,0,0,0.2);
            text-align: center;
        }

        .header-icon {
            background: linear-gradient(135deg, #667eea, #764ba2);
            width: 50px;

            border-radius: 50%;

        h2 { color: #2d3748; font-size: 20px; margin-bottom: 15px; font-weight: 700; border-bottom: 2px solid #eee; padding-bottom: 10px; }

        .info-group {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #f7fafc;

            border: 1px solid #e2e8f0;

        .label { font-size: 10px; color: #718096; text-transform: uppercase; font-weight: 700; display: block; }
        .value { font-size: 14px; color: #1a202c; font-weight: 600; word-break: break-all; }

        .copy-btn {
            background: #edf2f7;
            color: #4a5568;

            padding: 8px 12px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 4px;
            flex-shrink: 0;
        }
        .copy-btn:hover { background: #e2e8f0; }

        .login-btn {
            display: block;
            width: 100%;
            background: linear-gradient(135deg, #38b2ac 0%, #319795 100%);
            color: white;
            text-decoration: none;
            padding: 14px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: bold;
            margin-top: 15px;
            cursor: pointer;
            border: none;
            transition: 0.3s;
        }
        .login-btn:hover { transform: translateY(-2px); opacity: 0.9; }

        .mk-btn {
            background: linear-gradient(135deg, #4299e1 0%, #3182ce 100%);
        }

        .support-btn {
            background: rgba(255, 255, 255, 0.8);
            color: #4a5568;
            border: 1px solid #cbd5e0;
            padding: 12px;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
            width: 100%;
        }

        #toast {
            position: fixed;
            bottom: -60px;
            left: 50%;
            transform: translateX(-50%);
            background: #2d3748;
            color: white;
            padding: 12px 24px;
            border-radius: 30px;
            font-size: 14px;
            z-index: 1000;
            transition: 0.4s;
        }
        #toast.show { bottom: 30px; }
        svg { width: 14px; height: 14px; fill: currentColor; }

<body>

<div class="container">
    
    <!-- সার্ভিস ১: StexSMS -->
    <div class="card">

        <div class="info-group">
            <div class="details">

    <!-- অ্যাড সাপোর্ট বাটন -->
    <button onclick="playRewardedAd()" class="support-btn">
        🎁 একটি অ্যাড দেখে সাপোর্ট করুন
    </button>

<div id="toast">✅ সফলভাবে কপি হয়েছে!</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    // Interstitial Ad
    document.addEventListener("DOMContentLoaded", function() {
        if (typeof show_10714987 === 'function') {
            show_10714987({
              type: 'inApp',
              inAppSettings: { frequency: 2, capping: 0.1, interval: 30, timeout: 5, everyPage: false }
            }).catch(e => console.log("Ad Error:", e));
        }
    });

    // লিং ওপেন করার ফাংশন
    function openLink(url) {
        if (tg.initDataUnsafe && Object.keys(tg.initDataUnsafe).length > 0) {
            tg.openLink(url);
        } else {
            window.open(url, "_blank");
        }
    }

    // Rewarded Ad
    function playRewardedAd() {
        if (typeof show_10714987 === 'function') {
            show_10714987('pop').then(() => {
                showToastMessage("সাপোর্ট করার জন্য ধন্যবাদ! ❤️");
            }).catch(e => {
                showToastMessage("অ্যাড লোড হয়নি!");
            });
        } else {
            showToastMessage("সিস্টেম রেডি হচ্ছে...");
        }
    }

    // কপি ফাংশন
    function copyFast(elementId) {
        var text = document.getElementById(elementId).innerText;
        var tempInput = document.createElement("input");
        tempInput.value = text;
        document.body.appendChild(tempInput);
        tempInput.select();
        document.execCommand('copy');
        document.body.removeChild(tempInput);
        showToastMessage("✅ কপি করা হয়েছে!");
    }

    let toastTimeout;
    function showToastMessage(msg) {
        var toast = document.getElementById("toast");
        toast.innerText = msg;
        toast.classList.add("show");
        clearTimeout(toastTimeout);
        toastTimeout = setTimeout(() => { toast.classList.remove("show"); }, 2500);
    }
</script>

</body>
</html>
