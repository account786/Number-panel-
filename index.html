<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MK Network Access</title>
    <style>
        * { box-sizing: border-box; }
        body { font-family: sans-serif; background: #121212; color: #fff; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; padding: 15px; }
        
        .card { background: #1e1e1e; width: 100%; max-width: 350px; padding: 25px; border-radius: 15px; text-align: center; border: 1px solid #333; }
        h3 { margin-bottom: 20px; color: #00e676; font-size: 18px; }
        
        .box { background: #2c2c2c; padding: 12px; border-radius: 8px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #444; }
        .input-text { font-size: 14px; color: #eee; border:none; background:transparent; width: 70%; pointer-events: none; outline: none; }
        
        .btn-copy { background: #00e676; color: #000; border: none; padding: 6px 12px; border-radius: 5px; font-size: 12px; cursor: pointer; font-weight: bold; }
        
        .hint { font-size: 13px; color: #999; margin: 15px 0; line-height: 1.4; }
        
        .btn-main { width: 100%; background: #2979ff; color: white; border: none; padding: 14px; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .btn-main:active { background: #1565c0; transform: scale(0.98); }

        /* ছোট টোস্ট মেসেজ ডিজাইন */
        #toast {
            visibility: hidden;
            min-width: 150px;
            background-color: #333;
            color: #fff;
            text-align: center;
            border-radius: 20px;
            padding: 10px;
            position: fixed;
            z-index: 1;
            left: 50%;
            bottom: 30px;
            transform: translateX(-50%);
            font-size: 14px;
            border: 1px solid #00e676;
            opacity: 0;
            transition: opacity 0.5s, bottom 0.5s;
        }

        #toast.show {
            visibility: visible;
            opacity: 1;
            bottom: 50px;
        }
    </style>
</head>
<body>

<div class="card">
    <h3>MK Network Access</h3>

    <!-- জিমেইল বক্স -->
    <div class="box">
        <input type="text" value="hasankhan5258786@gmail.com" id="email" class="input-text" readonly>
        <button class="btn-copy" onclick="copy('email')">Copy</button>
    </div>

    <!-- পাসওয়ার্ড বক্স -->
    <div class="box">
        <input type="text" value="Nayem@1122" id="pass" class="input-text" readonly>
        <button class="btn-copy" onclick="copy('pass')">Copy</button>
    </div>

    <p class="hint">প্রথমে কপি করুন, তারপর নিচের বাটনে ক্লিক করে লগইন করুন।</p>

    <button class="btn-main" onclick="location.href='https://mknetworkbd.com/'">লগইন পেজ ওপেন করুন</button>
</div>

<!-- ছোট মেসেজ বক্স (টোস্ট) -->
<div id="toast">কপি হয়েছে!</div>

<script>
    function copy(id) {
        var copyText = document.getElementById(id);
        
        // কপি করার প্রসেস
        if (navigator.clipboard && navigator.clipboard.writeText) {
            navigator.clipboard.writeText(copyText.value).then(() => {
                showToast();
            });
        } else {
            // পুরোনো ব্রাউজারের জন্য ব্যাকআপ
            copyText.select();
            copyText.setSelectionRange(0, 99999);
            document.execCommand('copy');
            showToast();
        }
    }

    // ছোট মেসেজ দেখানোর ফাংশন
    function showToast() {
        var x = document.getElementById("toast");
        x.className = "show";
        setTimeout(function(){ x.className = x.className.replace("show", ""); }, 2000);
    }
</script>

</body>
</html>
