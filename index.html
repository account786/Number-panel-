<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StexSMS Premium Access</title>
    <style>
        /* মডার্ন ফন্ট ও জিরো ডিলে রিসেট */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            /* প্রিমিয়াম গ্রেডিয়েন্ট ব্যাকগ্রাউন্ড */
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        /* গ্লাসমরফিজম (Glassmorphism) কার্ড ডিজাইন */
        .card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            padding: 40px 30px;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            width: 100%;
            max-width: 420px;
            text-align: center;
            transform: translateY(0);
            transition: transform 0.3s ease;
        }
        .card:hover { transform: translateY(-5px); }

        .header-icon {
            background: linear-gradient(135deg, #667eea, #764ba2);
            width: 60px;
            height: 60px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0 auto 15px auto;
            color: white;
            font-size: 24px;
            box-shadow: 0 10px 20px rgba(118, 75, 162, 0.3);
        }

        h2 { color: #2d3748; font-size: 24px; margin-bottom: 25px; font-weight: 700; }

        /* ইনফো বক্সের ডিজাইন */
        .info-group {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #f7fafc;
            padding: 15px 20px;
            border-radius: 12px;
            margin-bottom: 15px;
            border: 1px solid #e2e8f0;
            transition: all 0.2s ease;
        }
        .info-group:hover { border-color: #cbd5e0; background: #fff; box-shadow: 0 4px 6px rgba(0,0,0,0.02); }

        .details { text-align: left; }
        .label { font-size: 11px; color: #718096; text-transform: uppercase; font-weight: 700; letter-spacing: 1px; display: block; margin-bottom: 4px; }
        .value { font-size: 16px; color: #1a202c; font-weight: 600; }

        /* মডার্ন কপি বাটন */
        .copy-btn {
            background: #edf2f7;
            color: #4a5568;
            border: none;
            padding: 10px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 700;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .copy-btn:hover { background: #e2e8f0; color: #2d3748; }
        .copy-btn:active { transform: scale(0.95); }

        /* অ্যাকশন বাটন (লগইন) */
        .login-btn {
            display: block;
            width: 100%;
            background: linear-gradient(135deg, #38b2ac 0%, #319795 100%);
            color: white;
            text-decoration: none;
            padding: 16px;
            border-radius: 12px;
            font-size: 18px;
            font-weight: bold;
            margin-top: 30px;
            transition: all 0.3s ease;
            box-shadow: 0 10px 20px rgba(49, 151, 149, 0.3);
        }
        .login-btn:hover { background: linear-gradient(135deg, #319795 0%, #2c7a7b 100%); box-shadow: 0 15px 25px rgba(49, 151, 149, 0.4); transform: translateY(-2px); }
        .login-btn:active { transform: translateY(0); }

        /* টোস্ট নোটিফিকেশন (Toast Message) */
        #toast {
            position: fixed;
            bottom: -60px;
            left: 50%;
            transform: translateX(-50%);
            background: #2d3748;
            color: white;
            padding: 12px 24px;
            border-radius: 30px;
            font-size: 14px;
            font-weight: 600;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
            transition: bottom 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            z-index: 1000;
        }
        #toast.show { bottom: 30px; }

        /* SVG আইকন সাপোর্ট */
        svg { width: 16px; height: 16px; fill: currentColor; }
    </style>
</head>
<body>

<div class="card">
    <div class="header-icon">
        <!-- ইউজার আইকন -->
        <svg viewBox="0 0 24 24" style="width: 30px; height: 30px;"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
    </div>
    <h2>StexSMS Access</h2>

    <!-- ইমেইল সেকশন -->
    <div class="info-group">
        <div class="details">
            <span class="label">ইমেইল (Email)</span>
            <span class="value" id="emailText">hbxmethod@gmail.com</span>
        </div>
        <button class="copy-btn" onclick="copyFast('emailText')">
            <svg viewBox="0 0 24 24"><path d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z"/></svg>
            কপি
        </button>
    </div>

    <!-- পাসওয়ার্ড সেকশন -->
    <div class="info-group">
        <div class="details">
            <span class="label">পাসওয়ার্ড (Password)</span>
            <span class="value" id="passText">hbx_marketiing</span>
        </div>
        <button class="copy-btn" onclick="copyFast('passText')">
            <svg viewBox="0 0 24 24"><path d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z"/></svg>
            কপি
        </button>
    </div>

    <!-- লগইন বাটন (Zero Delay) -->
    <!-- target="_blank" এবং rel="noopener noreferrer" দেওয়া হয়েছে ফাস্ট পারফরম্যান্সের জন্য -->
    <a href="https://stexsms.com/mauth/login" target="_blank" rel="noopener noreferrer" class="login-btn">লগইন করুন ➔</a>
</div>

<!-- টোস্ট মেসেজ -->
<div id="toast">✅ সফলভাবে কপি হয়েছে!</div>

<script>
    // সুপার ফাস্ট কপি ফাংশন
    function copyFast(elementId) {
        var text = document.getElementById(elementId).innerText;
        
        // ফাস্ট এক্সিকিউশনের জন্য ইনপুট তৈরি
        var tempInput = document.createElement("input");
        tempInput.style.position = "absolute";
        tempInput.style.left = "-9999px";
        tempInput.value = text;
        document.body.appendChild(tempInput);
        
        tempInput.select();
        tempInput.setSelectionRange(0, 99999);
        
        try {
            document.execCommand('copy');
            showToast(); // কপি হলে সুন্দর নোটিফিকেশন আসবে
        } catch (err) {
            alert("কপি করা যায়নি!");
        }
        
        document.body.removeChild(tempInput);
    }

    // টোস্ট নোটিফিকেশন দেখানোর ফাংশন (স্মুথ এনিমেশন)
    let toastTimeout;
    function showToast() {
        var toast = document.getElementById("toast");
        toast.classList.add("show");
        
        // আগের কোনো টাইমার থাকলে সেটা রিসেট করা
        clearTimeout(toastTimeout);
        
        // ২ সেকেন্ড পর মেসেজ চলে যাবে
        toastTimeout = setTimeout(function() {
            toast.classList.remove("show");
        }, 2000);
    }
</script>

</body>
</html>
