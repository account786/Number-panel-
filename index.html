<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Access Panel</title>
    <style>
        * { box-sizing: border-box; }
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: #121212; 
            color: #fff; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            min-height: 100vh; 
            margin: 0; 
            padding: 15px; 
        }
        
        /* নোটিশ বোর্ড স্টাইল */
        #notice-board {
            width: 100%;
            max-width: 500px;
            background: #ffeb3b;
            color: #000;
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 20px;
            font-weight: bold;
            display: none; /* শুরুতে লুকানো থাকবে */
            text-align: center;
            border-left: 5px solid #fbc02d;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .card { 
            background: #1e1e1e; 
            width: 100%; 
            max-width: 500px;
            padding: 30px 20px; 
            border-radius: 20px; 
            text-align: center; 
            border: 1px solid #333; 
            margin-bottom: 25px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        h3 { margin-bottom: 20px; color: #00e676; font-size: 22px; font-weight: 600; }
        
        .box { 
            background: #2c2c2c; 
            padding: 15px; 
            border-radius: 12px; 
            margin-bottom: 15px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            border: 1px solid #444; 
        }

        .input-text { 
            font-size: 16px; 
            color: #eee; 
            border:none; 
            background:transparent; 
            width: 75%; 
            pointer-events: none; 
            outline: none; 
            font-family: monospace;
        }
        
        .btn-copy { 
            background: #00e676; 
            color: #000; 
            border: none; 
            padding: 8px 16px; 
            border-radius: 8px; 
            font-size: 14px; 
            cursor: pointer; 
            font-weight: bold; 
            transition: 0.3s;
        }

        .btn-main { 
            width: 100%; 
            background: #2979ff; 
            color: white; 
            border: none; 
            padding: 16px; 
            border-radius: 12px; 
            font-size: 18px; 
            font-weight: bold; 
            cursor: pointer; 
            transition: 0.2s; 
        }

        #toast {
            visibility: hidden;
            min-width: 150px;
            background-color: #00e676;
            color: #000;
            text-align: center;
            border-radius: 50px;
            padding: 12px 25px;
            position: fixed;
            z-index: 10;
            left: 50%;
            bottom: 30px;
            transform: translateX(-50%);
            font-size: 15px;
            font-weight: bold;
            opacity: 0;
            transition: opacity 0.4s, bottom 0.4s;
        }

        #toast.show {
            visibility: visible;
            opacity: 1;
            bottom: 50px;
        }
    </style>
</head>
<body>

    <!-- ডাইনামিক নোটিশ বোর্ড -->
    <div id="notice-board"></div>

    <div class="card">
        <h3>MK Network Access</h3>
        <div class="box">
            <input type="text" value="hasankhan5258786@gmail.com" id="email1" class="input-text" readonly>
            <button class="btn-copy" onclick="copy('email1')">Copy</button>
        </div>
        <div class="box">
            <input type="text" value="Nayem@1122" id="pass1" class="input-text" readonly>
            <button class="btn-copy" onclick="copy('pass1')">Copy</button>
        </div>
        <p class="hint">তথ্যগুলো কপি করে নিচের বাটনে ক্লিক করুন।</p>
        <button class="btn-main" onclick="location.href='https://mknetworkbd.com/'">MK Network লগইন</button>
    </div>

    <div class="card">
        <h3>StexSMS Access</h3>
        <div class="box">
            <input type="text" value="nayemhasan7t8@gmail.com" id="email2" class="input-text" readonly>
            <button class="btn-copy" onclick="copy('email2')">Copy</button>
        </div>
        <div class="box">
            <input type="text" value="Nayem@1122" id="pass2" class="input-text" readonly>
            <button class="btn-copy" onclick="copy('pass2')">Copy</button>
        </div>
        <p class="hint">তথ্যগুলো কপি করে নিচের বাটনে ক্লিক করুন।</p>
        <button class="btn-main" style="background: #ff5722;" onclick="location.href='https://stexsms.com/'">StexSMS লগইন</button>
    </div>

    <div id="toast">কপি হয়েছে!</div>

    <script>
        // নোটিশ আপডেট করার ফাংশন
        function fetchNotice() {
            fetch('notice.txt')
                .then(response => response.text())
                .then(data => {
                    const board = document.getElementById('notice-board');
                    if (data.trim() !== "") {
                        board.innerText = data;
                        board.style.display = 'block';
                    } else {
                        board.style.display = 'none';
                    }
                })
                .catch(err => console.log('Notice file not found yet.'));
        }

        // প্রতি ৫ সেকেন্ডে নোটিশ চেক করবে
        setInterval(fetchNotice, 5000);
        fetchNotice();

        function copy(id) {
            var copyText = document.getElementById(id);
            navigator.clipboard.writeText(copyText.value).then(() => {
                showToast();
            });
        }

        function showToast() {
            var x = document.getElementById("toast");
            x.className = "show";
            setTimeout(function(){ x.className = x.className.replace("show", ""); }, 2000);
        }
    </script>
</body>
</html>
